<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    body { margin: 0; background: #fff; }
    .swiper { width: 100%; height: 100vh; }
    .swiper-slide img { width: 100%; height: 100%; object-fit: contain; }
    .swiper-button-next, .swiper-button-prev { color: #000; scale: 0.6; }
    .swiper-pagination-bullet-active { background: #000 !important; }
  </style>
</head>
<body>
  <div class="swiper">
    <div class="swiper-wrapper">
      
      <div class="swiper-slide"><img src="https://i.postimg.cc/Hk8mQ7d5/1.1.webp"></div>
      <div class="swiper-slide"><img src="https://i.postimg.cc/BQVsLCW7/1.webp"></div>
      <div class="swiper-slide"><img src="https://i.postimg.cc/bJgfzx9f/1а.webp"></div>
      <div class="swiper-slide"><img src="https://i.postimg.cc/J0hVtspr/1аа.webp"></div>
      </div>
    <div class="swiper-pagination"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-button-next"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    new Swiper('.swiper', { loop: true, pagination: { el: '.swiper-pagination' }, navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' } });
  </script>
</body>
</html>
