<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: transparent; overflow: hidden; }
        .amz-button {
            background: #FFD814;
            border: 1px solid #FCD200;
            border-radius: 8px;
            box-shadow: 0 2px 5px 0 rgba(213,217,217,.5);
            color: #0F1111;
            cursor: pointer;
            display: inline-block;
            font-family: "Amazon Ember", Arial, sans-serif;
            font-size: 13px;
            line-height: 29px;
            padding: 0 10px 0 11px;
            text-align: center;
            text-decoration: none;
            width: 90%; /* Почти на всю ширину */
            font-weight: 500;
        }
        .amz-button:hover { background: #F7CA00; border-color: #F2C200; }
    </style>
</head>
<body>
    <a id="btn" class="amz-button" href="#" target="_top">Загрузка...</a>

    <script>
        const params = new URLSearchParams(window.location.search);
        const text = params.get('text') || 'Смотреть варианты';
        const link = params.get('link') || '#';
        
        const btn = document.getElementById('btn');
        btn.innerText = text;
        btn.href = link;
    </script>
</body>
</html>
