<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: transparent; 
            display: flex; align-items: center; justify-content: center; 
        }
        
        .amz-button {
            background: #FFD814;
            border: 1px solid #FCD200;
            border-radius: 8px;
            box-shadow: 0 2px 5px 0 rgba(213,217,217,.5);
            color: #0F1111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            /* Кнопка заполнит весь блок, который вы выделите в редакторе */
            width: 100%; 
            height: 100%; 
            max-width: 280px;
            max-height: 50px; /* Ограничиваем, чтобы не стала гигантской */
            text-decoration: none;
            font-weight: 600;
            box-sizing: border-box;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .amz-button:hover { background: #F7CA00; }

        #generator {
            position: fixed; top: 0; left: 0; background: white; padding: 10px;
            border-bottom: 2px solid #ddd; display: none; z-index: 1000; width: 100%;
            box-sizing: border-box; font-family: sans-serif;
        }
        .input-group { display: flex; gap: 5px; margin-bottom: 5px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
        #copyBtn { background: #007185; color: white; border: none; padding: 8px; border-radius: 4px; }
        #result-link { font-size: 9px; color: #999; word-break: break-all; }
    </style>
</head>
<body>

    <div id="generator">
        <div class="input-group">
            <input type="text" id="inputText" placeholder="Текст" oninput="generate()">
            <input type="text" id="inputLink" placeholder="Ссылка" oninput="generate()">
            <button id="copyBtn" onclick="copyToClipboard()">Копировать</button>
        </div>
        <div id="result-link">...</div>
    </div>

    <a id="btn" class="amz-button" href="#" target="_top">Загрузка...</a>

    <script>
        const params = new URLSearchParams(window.location.search);
        const btn = document.getElementById('btn');
        if (params.get('mode') === 'edit') document.getElementById('generator').style.display = 'block';

        btn.innerText = params.get('text') || 'смотреть варианты';
        btn.href = params.get('link') || '#';

        function generate() {
            const t = document.getElementById('inputText').value || 'смотреть варианты';
            const l = document.getElementById('inputLink').value || '#';
            const finalUrl = `${window.location.origin}${window.location.pathname}?text=${encodeURIComponent(t)}&link=${encodeURIComponent(l)}`;
            document.getElementById('result-link').innerText = finalUrl;
            btn.innerText = t;
            btn.href = l;
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('result-link').innerText);
            document.getElementById('copyBtn').innerText = "ОК!";
        }
    </script>
</body>
</html>
