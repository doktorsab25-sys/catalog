<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        /* Убираем все отступы и фиксируем высоту для мобильных */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: transparent; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .amz-button {
            background: #FFD814;
            border: 1px solid #FCD200;
            border-radius: 8px;
            box-shadow: 0 2px 5px 0 rgba(213,217,217,.5);
            color: #0F1111;
            display: inline-block;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            /* Фиксированная высота кнопки, чтобы она не росла на телефоне */
            height: 40px; 
            line-height: 40px;
            padding: 0 20px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            /* Ограничиваем ширину, чтобы кнопка не была на весь экран */
            width: 220px; 
            box-sizing: border-box;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .amz-button:hover { background: #F7CA00; }

        /* Стиль для режима настройки */
        #generator {
            position: absolute;
            top: 0;
            background: white;
            padding: 10px;
            border: 1px solid #ccc;
            display: none;
            z-index: 100;
            font-family: sans-serif;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="generator">
        <input type="text" id="inputText" placeholder="Текст" oninput="generate()">
        <input type="text" id="inputLink" placeholder="Ссылка" oninput="generate()">
        <div id="result-link" style="font-size: 9px; word-break: break-all; margin-top: 5px;"></div>
    </div>

    <a id="btn" class="amz-button" href="#" target="_top">Загрузка...</a>

    <script>
        const params = new URLSearchParams(window.location.search);
        const text = params.get('text');
        const link = params.get('link');
        if (params.get('mode') === 'edit') document.getElementById('generator').style.display = 'block';

        const btn = document.getElementById('btn');
        btn.innerText = text || 'смотреть варианты';
        btn.href = link || '#';

        function generate() {
            const t = document.getElementById('inputText').value || 'смотреть варианты';
            const l = document.getElementById('inputLink').value || '#';
            const finalUrl = `${window.location.origin}${window.location.pathname}?text=${encodeURIComponent(t)}&link=${encodeURIComponent(l)}`;
            document.getElementById('result-link').innerText = finalUrl;
            btn.innerText = t;
            btn.href = l;
        }
    </script>
</body>
</html>
