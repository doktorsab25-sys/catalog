<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; display: flex; align-items: center; justify-content: center; }
        
        .amz-button {
            background: #FFD814; border: 1px solid #FCD200; border-radius: 8px;
            box-shadow: 0 2px 5px 0 rgba(213,217,217,.5); color: #0F1111;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Montserrat', sans-serif; font-size: 14px;
            height: 40px; width: 220px; text-decoration: none; font-weight: 600;
            box-sizing: border-box; transition: background 0.2s; white-space: nowrap; cursor: pointer;
        }
        .amz-button:hover { background: #F7CA00; }

        /* Панель управления */
        #generator {
            position: fixed; top: 0; left: 0; background: #fdfdfd; padding: 15px;
            border-bottom: 2px solid #eee; display: none; z-index: 1000; width: 100%;
            box-sizing: border-box; font-family: 'Montserrat', sans-serif;
        }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        input { flex: 1; min-width: 200px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
        
        /* Кнопка Копировать */
        #copyBtn {
            background: #007185; color: white; border: none; padding: 10px 20px;
            border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.2s;
        }
        #copyBtn:hover { background: #005a6a; }
        #copyBtn.success { background: #067D62; }

        #result-link { font-size: 10px; color: #777; word-break: break-all; margin-top: 5px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="generator">
        <div style="margin-bottom: 10px; font-size: 14px; font-weight: 600;">Настройка кнопки VSC™</div>
        <div class="input-group">
            <input type="text" id="inputText" placeholder="Текст (напр. смотреть варианты)" oninput="generate()">
            <input type="text" id="inputLink" placeholder="Ссылка на страницу" oninput="generate()">
            <button id="copyBtn" onclick="copyToClipboard()">Скопировать ссылку</button>
        </div>
        <div id="result-link">Ссылка появится здесь...</div>
    </div>

    <a id="btn" class="amz-button" href="#" target="_top">Загрузка...</a>

    <script>
        const params = new URLSearchParams(window.location.search);
        const btn = document.getElementById('btn');
        const genBox = document.getElementById('generator');
        const resDiv = document.getElementById('result-link');
        const copyBtn = document.getElementById('copyBtn');

        btn.innerText = params.get('text') || 'смотреть варианты';
        btn.href = params.get('link') || '#';

        if (params.get('mode') === 'edit') genBox.style.display = 'block';

        function generate() {
            const t = document.getElementById('inputText').value || 'смотреть варианты';
            const l = document.getElementById('inputLink').value || '#';
            const finalUrl = `${window.location.origin}${window.location.pathname}?text=${encodeURIComponent(t)}&link=${encodeURIComponent(l)}`;
            resDiv.innerText = finalUrl;
            btn.innerText = t;
            btn.href = l;
            copyBtn.innerText = "Скопировать ссылку";
            copyBtn.classList.remove('success');
        }

        function copyToClipboard() {
            const textToCopy = resDiv.innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                copyBtn.innerText = "ГОТОВО!";
                copyBtn.classList.add('success');
            });
        }
    </script>
</body>
</html>
